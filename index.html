<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수학코어 - 제휴 및 커뮤니티</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>수학코어</h1>
    </header>

    <main>
        <section id="contact-form">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/xnjgbdbo" method="POST">
                <div class="form-group">
                    <label for="company">업체명/성함</label>
                    <input type="text" id="company" name="company" required placeholder="예: 수학코어 문구">
                </div>
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" name="email" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" rows="5" required placeholder="제휴하고 싶은 내용을 적어주세요."></textarea>
                </div>
                <button type="submit" class="submit-btn">문의하기</button>
            </form>
        </section>

        <section id="comments">
            <div id="disqus_thread"></div>
            <script>
                var disqus_config = function () {
                    this.page.url = window.location.href;
                    this.page.identifier = window.location.pathname;
                };
                (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://mathcore.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 수학코어. All rights reserved.</p>
    </footer>
</body>
</html>
